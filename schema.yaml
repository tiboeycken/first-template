openapi: 3.0.3
info:
  title: OpenAPI schema for template first-template
  version: 1.0.0

components:
  schemas:
    variables:
      type: object
      required:
        - vm_name
        - gcp_machine_type
        - vm_disk_size_gb
        - assign_public_ip
        - create_http_firewall
        - nginx_start_page_title
      properties:
        vm_name:
          title: VM Name
          description: Name of the VM to create.
          type: string
          default: nginx
          x-walrus-ui:
            group: VM Configuration

        gcp_machine_type:
          title: Machine Type
          description: GCP machine type for the VM.
          type: string
          default: e2-micro
          x-walrus-ui:
            group: VM Configuration

        vm_disk_size_gb:
          title: Disk Size (GB)
          description: Primary disk size in GB.
          type: number
          default: 12
          minimum: 10
          x-walrus-ui:
            group: VM Configuration

        nginx_start_page_title:
          title: Nginx Page Title
          description: Title shown in the generated nginx start page.
          type: string
          default: Nginx is running
          x-walrus-ui:
            group: VM Configuration

        assign_public_ip:
          title: Assign Public IP
          description: Assign an ephemeral public IP address to the VM.
          type: boolean
          default: true
          x-walrus-ui:
            group: Network

        create_http_firewall:
          title: Create HTTP Firewall Rule
          description: Create a firewall rule that allows inbound HTTP traffic on port 80.
          type: boolean
          default: true
          x-walrus-ui:
            group: Network
